<header class="main-header">
  <div class="header-top wrapper-limiter">
    <div class="logo">
      <img
        src="assets/logo.png"
        alt="logo"
        class="logo-img"
        routerLink="/"
        style="cursor: pointer"
      />
    </div>

    <form
      class="search-form"
      (submit)="search(searchBox.value); $event.preventDefault()"
    >
      <div class="input-container">
        <input
          #searchBox
          type="search"
          placeholder="Pesquisar livro..."
          class="input-search"
        />

        <button type="submit" class="btn-search">
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            stroke="currentColor"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
        </button>
      </div>
    </form>

    <div class="auth-container">
      <ng-container *ngIf="user() as currentUser">
        <span class="user-trigger" [matMenuTriggerFor]="userMenu">
          <p>Olá, {{ currentUser.firstName }}</p>
          <mat-icon>expand_more</mat-icon>
        </span>
        <mat-menu #userMenu="matMenu" class="user-menu">
          <app-user-menu></app-user-menu>
        </mat-menu>
      </ng-container>

      <button *ngIf="!isLoggedIn()" class="button" (click)="openLoginModal()">
        Entrar
      </button>
    </div>
  </div>

  <div class="header-bottom wrapper-limiter">
    <nav class="main-nav">
      <a
        routerLink="/"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }"
        >Início</a
      >
      <a routerLink="/catalog" routerLinkActive="active">Catálogo</a>
    </nav>

    <div class="filters-container">
      <select name="genre-filter" class="custom-select">
        <option value="" disabled selected>Gênero</option>
      </select>
      <select name="sort-by" class="custom-select">
        <option value="" disabled selected>Ordenar por</option>
      </select>
    </div>
  </div>
</header>

@if (isAuthModalOpen()) {
  <div class="modal-overlay" (click)="closeLoginModal()">
    <div class="modal-content" (click)="$event.stopPropagation()">
      <app-auth-modal (onClose)="closeLoginModal()"></app-auth-modal>
    </div>
  </div>
}
